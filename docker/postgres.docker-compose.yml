services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: langflow-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langflow}
      POSTGRES_DB: ${POSTGRES_DB:-langflow}
      PGDATA: /var/lib/postgresql/data
      POSTGRES_INITDB_ARGS: --encoding=UTF-8
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - langflow-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langflow} -d ${POSTGRES_DB:-langflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  langflow-dev-postgres-data:
    driver: local
    name: langflow-dev-postgres-data
