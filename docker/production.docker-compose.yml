version: '3.8'

services:
  # Langflow 主服务
  langflow:
    # 使用已有镜像
    image: akcow/langflow-custom:latest
    # 如需重新构建，取消下面注释
    # build:
    #   context: ..
    #   dockerfile: docker/production.Dockerfile
    container_name: langflow-app
    restart: unless-stopped
    ports:
      - "${LANGFLOW_PORT:-7860}:7860"
    environment:
      # 数据库配置
      - LANGFLOW_DATABASE_URL=postgresql://${POSTGRES_USER:-langflow}:${POSTGRES_PASSWORD:-langflow}@postgres:5432/${POSTGRES_DB:-langflow}

      # 基础配置
      - LANGFLOW_CONFIG_DIR=/app/langflow_config
      - LANGFLOW_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LANGFLOW_SUPERUSER=${SUPERUSER_USERNAME:-admin}
      - LANGFLOW_SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD:-admin}

      # 安全配置
      - LANGFLOW_SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-secret-key}

      # 可选:禁用自动登录
      - LANGFLOW_SKIP_AUTH_AUTO_LOGIN=${SKIP_AUTO_LOGIN:-false}

      # 可选:API密钥配置
      - LANGFLOW_API_KEY=${API_KEY:-}
      - LANGFLOW_API_KEY_ENABLED=${API_KEY_ENABLED:-false}

    volumes:
      # 持久化配置和数据
      - langflow-config:/app/langflow_config
      - langflow-data:/app/data

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - langflow-network

    # 资源限制(可选)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 2G
          cpus: '1'

  # PostgreSQL 数据库
  postgres:
    # 使用Supabase PostgreSQL镜像
    image: public.ecr.aws/supabase/postgres:15.8.1.085
    container_name: langflow-postgres
    restart: unless-stopped

    environment:
      - POSTGRES_USER=${POSTGRES_USER:-langflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-langflow}
      - POSTGRES_DB=${POSTGRES_DB:-langflow}
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8

    volumes:
      - postgres-data:/var/lib/postgresql/data

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langflow} -d ${POSTGRES_DB:-langflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - langflow-network

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # Nginx 反向代理(可选,用于生产环境)
  # 如果使用外部负载均衡器或域名,可以启用此服务
  # nginx:
  #   image: nginx:alpine
  #   container_name: langflow-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - langflow
  #   networks:
  #     - langflow-network

# 数据卷定义
volumes:
  postgres-data:
    driver: local
    name: langflow-postgres-data

  langflow-config:
    driver: local
    name: langflow-config-data

  langflow-data:
    driver: local
    name: langflow-app-data

# 网络定义
networks:
  langflow-network:
    driver: bridge
    name: langflow-network
