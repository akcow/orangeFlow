<!doctype html>
<html lang="en">
  <head>
    <base href="/" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="apple-touch-icon" sizes="180x180" href="/branding/orangeflow-icon-180.png?v=20260305" />
    <link rel="icon" type="image/png" sizes="32x32" href="/branding/orangeflow-icon-32.png?v=20260305" />
    <link rel="icon" type="image/png" sizes="16x16" href="/branding/orangeflow-icon-16.png?v=20260305" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <script
      src="/node_modules/ace-builds/src-min-noconflict/ace.js"
      type="module"
    ></script>
    <title>orangeflow</title>
  </head>
  <body id="body" style="width: 100%; height: 100%">
    <script>
      // Apply theme early to avoid a flash of the wrong theme.
      (() => {
        try {
          const stored = window.localStorage.getItem("isDark");
          const prefersDark =
            window.matchMedia?.("(prefers-color-scheme: dark)")?.matches ?? false;
          const dark = stored === null ? prefersDark : JSON.parse(stored);
          const body = document.getElementById("body");
          if (dark) body?.classList.add("dark");
          else body?.classList.remove("dark");
        } catch {
          // ignore
        }
      })();
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div style="width: 100vw; height: 100vh" id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
