services:
  orangeflow:
    image: orangeflow-custom:lite
    build:
      context: ..
      dockerfile: docker/production-prebuilt.Dockerfile
    container_name: orangeflow-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${LANGFLOW_BIND_ADDRESS:-0.0.0.0}:${LANGFLOW_PORT:-7860}:7860"
    environment:
      LANGFLOW_DATABASE_URL: "postgresql://${POSTGRES_USER:-orangeflow}:${POSTGRES_PASSWORD:-change-this-password}@postgres:5432/${POSTGRES_DB:-orangeflow}"
      LANGFLOW_CONFIG_DIR: /app/orangeflow_config
      LANGFLOW_LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LANGFLOW_SUPERUSER: "${SUPERUSER_USERNAME:-admin}"
      LANGFLOW_SUPERUSER_PASSWORD: "${SUPERUSER_PASSWORD:-change-this-admin-password}"
      LANGFLOW_SECRET_KEY: "${SECRET_KEY:-change-this-to-a-random-secret-key}"
      LANGFLOW_AUTO_LOGIN: "${LANGFLOW_AUTO_LOGIN:-false}"
      LANGFLOW_SKIP_AUTH_AUTO_LOGIN: "${LANGFLOW_SKIP_AUTH_AUTO_LOGIN:-false}"
      LANGFLOW_API_KEY: "${API_KEY:-}"
      LANGFLOW_PUBLIC_BASE_URL: "${LANGFLOW_PUBLIC_BASE_URL:-}"
      BACKEND_URL: "${BACKEND_URL:-}"
      LANGFLOW_ACCESS_SECURE: "${LANGFLOW_ACCESS_SECURE:-false}"
      LANGFLOW_REFRESH_SECURE: "${LANGFLOW_REFRESH_SECURE:-false}"
      LANGFLOW_ACCESS_SAME_SITE: "${LANGFLOW_ACCESS_SAME_SITE:-lax}"
      LANGFLOW_REFRESH_SAME_SITE: "${LANGFLOW_REFRESH_SAME_SITE:-lax}"
      LANGFLOW_CORS_ORIGINS: "${LANGFLOW_CORS_ORIGINS:-http://localhost:7860,http://127.0.0.1:7860}"
      LANGFLOW_STORAGE_TYPE: "${LANGFLOW_STORAGE_TYPE:-local}"
    volumes:
      - orangeflow-config:/app/orangeflow_config
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health_check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - orangeflow-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: orangeflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-orangeflow}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-this-password}"
      POSTGRES_DB: "${POSTGRES_DB:-orangeflow}"
      PGDATA: /var/lib/postgresql/data
      POSTGRES_INITDB_ARGS: --encoding=UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orangeflow} -d ${POSTGRES_DB:-orangeflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - orangeflow-network

  nginx:
    profiles:
      - https-proxy
    image: nginx:1.27-alpine
    container_name: orangeflow-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_BIND_ADDRESS:-0.0.0.0}:${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_BIND_ADDRESS:-0.0.0.0}:${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      orangeflow:
        condition: service_healthy
    networks:
      - orangeflow-network

volumes:
  postgres-data:
    driver: local
    name: orangeflow-postgres-data
  orangeflow-config:
    driver: local
    name: orangeflow-config-data

networks:
  orangeflow-network:
    driver: bridge
    name: orangeflow-network
