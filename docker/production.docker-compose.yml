services:
  orangeflow:
    image: orangeflow-custom:local
    build:
      context: ..
      dockerfile: docker/production.Dockerfile
    container_name: orangeflow-app
    restart: unless-stopped
    env_file:
      - .env
    # ports:
    #   - "${LANGFLOW_BIND_ADDRESS:-0.0.0.0}:${LANGFLOW_PORT:-7860}:7860"
    environment:
      LANGFLOW_DATABASE_URL: "postgresql://${POSTGRES_USER:-orangeflow}:${POSTGRES_PASSWORD:-change-this-password}@postgres:5432/${POSTGRES_DB:-orangeflow}"
      LANGFLOW_CONFIG_DIR: /app/orangeflow_config
      LANGFLOW_LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LANGFLOW_SUPERUSER: "${SUPERUSER_USERNAME:-admin}"
      LANGFLOW_SUPERUSER_PASSWORD: "${SUPERUSER_PASSWORD:-change-this-admin-password}"
      LANGFLOW_SECRET_KEY: "${SECRET_KEY:-change-this-to-a-random-secret-key}"
      LANGFLOW_AUTO_LOGIN: "${LANGFLOW_AUTO_LOGIN:-false}"
      LANGFLOW_SKIP_AUTH_AUTO_LOGIN: "${LANGFLOW_SKIP_AUTH_AUTO_LOGIN:-false}"
      LANGFLOW_API_KEY: "${API_KEY:-}"
      LANGFLOW_PUBLIC_BASE_URL: "${LANGFLOW_PUBLIC_BASE_URL:-}"
      BACKEND_URL: "${BACKEND_URL:-}"
      LANGFLOW_ACCESS_SECURE: "${LANGFLOW_ACCESS_SECURE:-false}"
      LANGFLOW_REFRESH_SECURE: "${LANGFLOW_REFRESH_SECURE:-false}"
      LANGFLOW_ACCESS_SAME_SITE: "${LANGFLOW_ACCESS_SAME_SITE:-lax}"
      LANGFLOW_REFRESH_SAME_SITE: "${LANGFLOW_REFRESH_SAME_SITE:-lax}"
      LANGFLOW_CORS_ORIGINS: "${LANGFLOW_CORS_ORIGINS:-http://localhost:7860,http://127.0.0.1:7860}"
      LANGFLOW_STORAGE_TYPE: "${LANGFLOW_STORAGE_TYPE:-minio}"
      LANGFLOW_S3_BUCKET_NAME: "${MINIO_BUCKET:-orangeflow-assets}"
      LANGFLOW_S3_REGION: "${MINIO_REGION:-us-east-1}"
      LANGFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      LANGFLOW_S3_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
      LANGFLOW_S3_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-change-this-minio-password}"
      LANGFLOW_S3_ROOT_PREFIX: "${MINIO_ROOT_PREFIX:-prod}"
      LANGFLOW_S3_PUBLIC_BASE_URL: "${MINIO_PUBLIC_BASE_URL:-}"
      LANGFLOW_S3_PRESIGN_EXPIRATION: "${MINIO_PRESIGN_EXPIRATION:-3600}"
      LANGFLOW_S3_ADDRESSING_STYLE: path
      LANGFLOW_S3_USE_SSL: "false"
      LANGFLOW_S3_VERIFY_SSL: "false"
    volumes:
      - orangeflow-config:/app/orangeflow_config
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health_check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - orangeflow-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: orangeflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-orangeflow}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-this-password}"
      POSTGRES_DB: "${POSTGRES_DB:-orangeflow}"
      PGDATA: /var/lib/postgresql/data
      POSTGRES_INITDB_ARGS: --encoding=UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orangeflow} -d ${POSTGRES_DB:-orangeflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - orangeflow-network

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: orangeflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-change-this-minio-password}"
      MINIO_REGION: "${MINIO_REGION:-us-east-1}"
    volumes:
      - minio-data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - orangeflow-network

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: orangeflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-change-this-minio-password}" &&
        mc mb --ignore-existing local/"${MINIO_BUCKET:-orangeflow-assets}" || true
    restart: "no"
    networks:
      - orangeflow-network

  nginx:
    image: nginx:latest
    container_name: orangeflow-nginx
    restart: unless-stopped
    ports:
      # 将宿主机的 7860 端口映射到 Nginx 的 HTTPS 443 端口
      - "${LANGFLOW_BIND_ADDRESS:-0.0.0.0}:${LANGFLOW_PORT:-7860}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - orangeflow
    networks:
      - orangeflow-network

volumes:
  postgres-data:
    driver: local
    name: orangeflow-postgres-data
  minio-data:
    driver: local
    name: orangeflow-minio-data
  orangeflow-config:
    driver: local
    name: orangeflow-config-data

networks:
  orangeflow-network:
    driver: bridge
    name: orangeflow-network
