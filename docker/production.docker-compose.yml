services:
  langflow:
    image: langflow-custom:local
    build:
      context: ..
      dockerfile: docker/production.Dockerfile
    container_name: langflow-app
    restart: unless-stopped
    ports:
      - "${LANGFLOW_PORT:-7860}:7860"
    environment:
      - LANGFLOW_DATABASE_URL=postgresql://${POSTGRES_USER:-langflow}:${POSTGRES_PASSWORD:-langflow}@postgres:5432/${POSTGRES_DB:-langflow}
      - LANGFLOW_CONFIG_DIR=/app/langflow_config
      - LANGFLOW_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LANGFLOW_SUPERUSER=${SUPERUSER_USERNAME:-admin}
      - LANGFLOW_SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD:-admin}
      - LANGFLOW_SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-secret-key}
      - LANGFLOW_SKIP_AUTH_AUTO_LOGIN=${SKIP_AUTO_LOGIN:-false}
      - LANGFLOW_API_KEY=${API_KEY:-}
      - LANGFLOW_API_KEY_ENABLED=${API_KEY_ENABLED:-false}
    volumes:
      - langflow-config:/app/langflow_config
      - langflow-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - langflow-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: langflow-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-langflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-langflow}
      - POSTGRES_DB=${POSTGRES_DB:-langflow}
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langflow} -d ${POSTGRES_DB:-langflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - langflow-network

volumes:
  postgres-data:
    driver: local
    name: langflow-postgres-data
  langflow-config:
    driver: local
    name: langflow-config-data
  langflow-data:
    driver: local
    name: langflow-app-data

networks:
  langflow-network:
    driver: bridge
    name: langflow-network
